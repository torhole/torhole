---
- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - jq
      - iproute2
      - net-tools
      - python3
      - rsync
      - vlan
      # QEMU guest agent: lets the Proxmox host cleanly shut down / query the
      # VM (qm agent, graceful shutdown, IP reporting). Harmless no-op on
      # bare-metal/non-QEMU hosts — the service only activates when the
      # virtio agent channel is present. Enable the channel with
      # `qm set <vmid> --agent enabled=1` on the Proxmox side.
      - qemu-guest-agent
    state: present
    update_cache: yes

- name: Enable the QEMU guest agent when its virtio channel exists
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started
  when: ansible_facts.virtualization_type | default('') == 'kvm'
  failed_when: false

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"
  when: timezone is defined
