name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate configs & backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pi-dns-warden

    steps:
      - uses: actions/checkout@v4

      - name: Copy env example
        run: cp .env.example .env

      - name: Validate Advanced Single-LAN compose
        run: TORHOLE_TOPOLOGY=single-lan docker compose -f docker-compose.yml -f docker-compose.monitoring.yml config --quiet

      - name: Validate Advanced VLAN compose
        run: TORHOLE_TOPOLOGY=vlan docker compose --profile vlan -f docker-compose.yml -f docker-compose.monitoring.yml config --quiet

      - name: Check Python syntax (all services)
        run: |
          find monitoring -name "*.py" -not -path "*/__pycache__/*" \
            -exec python3 -m py_compile {} \;

      - name: Backend security tests
        run: python3 monitoring/backup-manager/test_security.py

      - name: Backend characterization tests
        run: python3 monitoring/backup-manager/test_characterization.py

      - name: Bootstrap and Home backend tests
        run: |
          python3 bootstrap/test_server.py
          python3 bootstrap/test_host_runner.py
          python3 home-dashboard/test_server.py

      - name: Shell tests (env loader + compose hardening)
        run: |
          bash ops/tests/test-executable-modes.sh
          bash ops/tests/test-load-env.sh
          bash ops/tests/test-security-compose.sh
          bash ops/tests/test-topology-compose.sh
          bash ops/tests/test-get-torhole.sh

      - name: Validate dnscrypt configs (TOML)
        run: |
          pip install tomli --quiet
          for f in dnscrypt/*/dnscrypt-proxy.toml; do
            python3 -c "import tomli; tomli.loads(open('$f').read())" && echo "OK: $f"
          done

      # The prom/prometheus image's entrypoint IS the prometheus binary, so
      # `... prom/prometheus promtool ...` feeds "promtool" as an argument to
      # prometheus ("unexpected promtool"). Override the entrypoint to run
      # promtool directly.
      - name: Validate Prometheus config
        run: |
          TORHOLE_TOPOLOGY=vlan bash ops/scripts/13-render-prometheus.sh
          docker run --rm --entrypoint promtool \
            -v "$GITHUB_WORKSPACE/pi-dns-warden/monitoring/prometheus:/etc/prometheus:ro" \
            prom/prometheus:latest \
            check config /etc/prometheus/prometheus.runtime.yml

      - name: Validate Prometheus alert rules
        run: |
          docker run --rm --entrypoint promtool \
            -v "$GITHUB_WORKSPACE/pi-dns-warden/monitoring/prometheus:/etc/prometheus:ro" \
            prom/prometheus:latest \
            check rules /etc/prometheus/alert.rules.yml

      - name: Validate Caddy config
        run: |
          # Access/TLS snippets are rendered at deploy time (18-render-auth.sh);
          # stub them so the top-level imports resolve during static validation.
          printf '(access_gate) { header X-Torhole-CI true }\n(ip_access_gate) { import access_gate }\n' \
            > monitoring/caddy/auth-snippets.caddy
          printf '(tls_mode) { tls internal }\n' \
            > monitoring/caddy/tls-snippets.caddy
          docker run --rm --env-file .env \
            -e HOST_MGMT_IP=192.0.2.10 \
            -e TORHOLE_WEB_SCHEME=https \
            -v "$GITHUB_WORKSPACE/pi-dns-warden/monitoring/caddy:/etc/caddy:ro" \
            caddy:latest \
            caddy validate --config /etc/caddy/Caddyfile

  ui:
    name: UI typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pi-dns-warden/monitoring/torhole-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pi-dns-warden/monitoring/torhole-ui/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Install Chromium for bootstrap option tests
        run: PLAYWRIGHT_BROWSERS_PATH=./.playwright-browsers npx playwright install --with-deps chromium
      - name: Test every bootstrap setup option
        run: npm run test:e2e:bootstrap

  lint-shell:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./pi-dns-warden
          # Gate on warning+ (real portability/correctness issues). SC-level
          # "note" style hints (SC1091 unfollowable sources, SC2029 ssh-side
          # expansion, SC2012 ls) are informational and don't block deploys.
          severity: warning
