name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    name: Build, attest, and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < pi-dns-warden/VERSION)"
          test "$GITHUB_REF_NAME" = "v${version}"
          grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' pi-dns-warden/VERSION

      - name: Build reproducible source artifact
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < pi-dns-warden/VERSION)"
          revision="${GITHUB_SHA:0:12}"
          source_date_epoch="$(git show -s --format=%ct HEAD)"
          stage="$RUNNER_TEMP/torhole-${version}"

          mkdir -p "$stage" dist
          git archive --format=tar HEAD | tar -xf - -C "$stage"
          printf '%s\n' "$revision" > "$stage/pi-dns-warden/.torhole-revision"

          tar --sort=name \
            --mtime="@${source_date_epoch}" \
            --owner=0 --group=0 --numeric-owner \
            -cf "dist/torhole-v${version}.tar" \
            -C "$RUNNER_TEMP" "torhole-${version}"
          gzip -n "dist/torhole-v${version}.tar"
          cd dist
          sha256sum "torhole-v${version}.tar.gz" > SHA256SUMS

      - name: Attest release artifact provenance
        uses: actions/attest@v4
        with:
          subject-path: "dist/torhole-${{ github.ref_name }}.tar.gz"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/torhole-${GITHUB_REF_NAME}.tar.gz" \
            dist/SHA256SUMS \
            --verify-tag \
            --title "Torhole ${GITHUB_REF_NAME}" \
            --generate-notes
