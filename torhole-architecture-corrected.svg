<svg xmlns="http://www.w3.org/2000/svg" width="900" height="820" viewBox="0 0 900 820" style="font-family:system-ui,sans-serif;background:#0d0d0d">
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5a9fd4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Internet -->
<rect x="340" y="18" width="160" height="34" rx="8" fill="#2a2a2a" stroke="#555" stroke-width="0.8"/>
<text x="420" y="35" text-anchor="middle" dominant-baseline="central" fill="#aaa" font-size="13">Internet</text>

<!-- tor_out -->
<rect x="270" y="70" width="300" height="32" rx="8" fill="#3a3065" stroke="#7f77dd" stroke-width="0.8"/>
<text x="420" y="86" text-anchor="middle" dominant-baseline="central" fill="#afa9ec" font-size="12">tor_out — only outbound bridge</text>
<line x1="420" y1="52" x2="420" y2="70" stroke="#888" stroke-width="0.8" marker-end="url(#a)"/>

<!-- Tor container -->
<rect x="285" y="118" width="270" height="48" rx="8" fill="#3a3065" stroke="#7f77dd" stroke-width="1"/>
<text x="420" y="136" text-anchor="middle" dominant-baseline="central" fill="#cecbf6" font-size="14" font-weight="500">Tor</text>
<text x="420" y="154" text-anchor="middle" dominant-baseline="central" fill="#afa9ec" font-size="11">circuit isolation via SOCKS auth per plane</text>
<line x1="420" y1="102" x2="420" y2="118" stroke="#888" stroke-width="0.8" marker-end="url(#a)"/>

<!-- dns_int container -->
<rect x="18" y="180" width="548" height="440" rx="14" fill="none" stroke="#444" stroke-width="1" stroke-dasharray="7 4"/>
<text x="30" y="196" fill="#666" font-size="10">dns_int — internal bridge (no gateway, Internal: true)</text>

<!-- Tor to dnscrypt bus -->
<line x1="420" y1="166" x2="420" y2="178" stroke="#666" stroke-width="0.8"/>
<line x1="120" y1="178" x2="460" y2="178" stroke="#666" stroke-width="0.8"/>
<line x1="120" y1="178" x2="120" y2="200" stroke="#888" stroke-width="0.8" marker-end="url(#a)"/>
<line x1="290" y1="178" x2="290" y2="200" stroke="#888" stroke-width="0.8" marker-end="url(#a)"/>
<line x1="460" y1="178" x2="460" y2="200" stroke="#888" stroke-width="0.8" marker-end="url(#a)"/>

<!-- dnscrypt row -->
<rect x="38" y="200" width="164" height="44" rx="8" fill="#0f4a3a" stroke="#1d9e75" stroke-width="0.8"/>
<text x="120" y="218" text-anchor="middle" dominant-baseline="central" fill="#9fe1cb" font-size="13" font-weight="500">dnscrypt</text>
<text x="120" y="234" text-anchor="middle" dominant-baseline="central" fill="#5dcaa5" font-size="11">trusted</text>

<rect x="208" y="200" width="164" height="44" rx="8" fill="#0f4a3a" stroke="#1d9e75" stroke-width="0.8"/>
<text x="290" y="218" text-anchor="middle" dominant-baseline="central" fill="#9fe1cb" font-size="13" font-weight="500">dnscrypt</text>
<text x="290" y="234" text-anchor="middle" dominant-baseline="central" fill="#5dcaa5" font-size="11">IoT</text>

<rect x="378" y="200" width="164" height="44" rx="8" fill="#0f4a3a" stroke="#1d9e75" stroke-width="0.8"/>
<text x="460" y="218" text-anchor="middle" dominant-baseline="central" fill="#9fe1cb" font-size="13" font-weight="500">dnscrypt</text>
<text x="460" y="234" text-anchor="middle" dominant-baseline="central" fill="#5dcaa5" font-size="11">guest</text>

<!-- dnscrypt to pihole arrows -->
<line x1="120" y1="244" x2="120" y2="264" stroke="#888" stroke-width="0.8" marker-end="url(#a)"/>
<line x1="290" y1="244" x2="290" y2="264" stroke="#888" stroke-width="0.8" marker-end="url(#a)"/>
<line x1="460" y1="244" x2="460" y2="264" stroke="#888" stroke-width="0.8" marker-end="url(#a)"/>

<!-- Pi-hole row — each on dns_int AND its own macvlan -->
<rect x="38" y="264" width="164" height="52" rx="8" fill="#0c3a6b" stroke="#378add" stroke-width="0.8"/>
<text x="120" y="281" text-anchor="middle" dominant-baseline="central" fill="#b5d4f4" font-size="13" font-weight="500">Pi-hole</text>
<text x="120" y="297" text-anchor="middle" dominant-baseline="central" fill="#85b7eb" font-size="11">trusted · 192.168.1.53</text>
<text x="120" y="310" text-anchor="middle" dominant-baseline="central" fill="#378add" font-size="10">dns_int + macvlan-vlan1</text>

<rect x="208" y="264" width="164" height="52" rx="8" fill="#0c3a6b" stroke="#378add" stroke-width="0.8"/>
<text x="290" y="281" text-anchor="middle" dominant-baseline="central" fill="#b5d4f4" font-size="13" font-weight="500">Pi-hole</text>
<text x="290" y="297" text-anchor="middle" dominant-baseline="central" fill="#85b7eb" font-size="11">IoT · 192.168.50.53</text>
<text x="290" y="310" text-anchor="middle" dominant-baseline="central" fill="#378add" font-size="10">dns_int + macvlan-vlan50</text>

<rect x="378" y="264" width="164" height="52" rx="8" fill="#0c3a6b" stroke="#378add" stroke-width="0.8"/>
<text x="460" y="281" text-anchor="middle" dominant-baseline="central" fill="#b5d4f4" font-size="13" font-weight="500">Pi-hole</text>
<text x="460" y="297" text-anchor="middle" dominant-baseline="central" fill="#85b7eb" font-size="11">guest · 10.10.99.10</text>
<text x="460" y="310" text-anchor="middle" dominant-baseline="central" fill="#378add" font-size="10">dns_int + macvlan-vlan99</text>

<!-- Monitoring row header -->
<text x="30" y="336" fill="#666" font-size="10">Monitoring — amber: dns_int + mgmt_net · gray: dns_int only</text>

<!-- Monitoring row 1 -->
<rect x="30" y="344" width="118" height="34" rx="6" fill="#3d2a00" stroke="#ba7517" stroke-width="0.7"/>
<text x="89" y="361" text-anchor="middle" dominant-baseline="central" fill="#fac775" font-size="12">Prometheus</text>

<rect x="154" y="344" width="118" height="34" rx="6" fill="#3d2a00" stroke="#ba7517" stroke-width="0.7"/>
<text x="213" y="361" text-anchor="middle" dominant-baseline="central" fill="#fac775" font-size="12">Grafana</text>

<rect x="278" y="344" width="118" height="34" rx="6" fill="#3d2a00" stroke="#ba7517" stroke-width="0.7"/>
<text x="337" y="361" text-anchor="middle" dominant-baseline="central" fill="#fac775" font-size="12">Alertmanager</text>

<rect x="402" y="344" width="150" height="34" rx="6" fill="#222" stroke="#555" stroke-width="0.7"/>
<text x="477" y="361" text-anchor="middle" dominant-baseline="central" fill="#888" font-size="12">Loki + Alloy</text>

<!-- Monitoring row 2 -->
<rect x="30" y="384" width="118" height="34" rx="6" fill="#3d2a00" stroke="#ba7517" stroke-width="0.7"/>
<text x="89" y="401" text-anchor="middle" dominant-baseline="central" fill="#fac775" font-size="12">blackbox-exp</text>

<rect x="154" y="384" width="118" height="34" rx="6" fill="#3d2a00" stroke="#ba7517" stroke-width="0.7"/>
<text x="213" y="401" text-anchor="middle" dominant-baseline="central" fill="#fac775" font-size="12">Dockhand</text>

<rect x="278" y="384" width="118" height="34" rx="6" fill="#222" stroke="#555" stroke-width="0.7"/>
<text x="337" y="401" text-anchor="middle" dominant-baseline="central" fill="#888" font-size="12">node + cadvisor</text>

<rect x="402" y="384" width="150" height="34" rx="6" fill="#222" stroke="#555" stroke-width="0.7"/>
<text x="477" y="401" text-anchor="middle" dominant-baseline="central" fill="#888" font-size="12">pihole-exporter</text>

<!-- Edge header -->
<text x="30" y="432" fill="#666" font-size="10">Edge</text>

<!-- Edge row -->
<rect x="30" y="440" width="168" height="48" rx="8" fill="#3d1a10" stroke="#d85a30" stroke-width="0.8"/>
<text x="114" y="457" text-anchor="middle" dominant-baseline="central" fill="#f5c4b3" font-size="13" font-weight="500">Caddy</text>
<text x="114" y="474" text-anchor="middle" dominant-baseline="central" fill="#f0997b" font-size="11">dns_int + mgmt_net</text>

<rect x="204" y="440" width="168" height="48" rx="8" fill="#222" stroke="#555" stroke-width="0.8"/>
<text x="288" y="457" text-anchor="middle" dominant-baseline="central" fill="#aaa" font-size="13" font-weight="500">Authelia</text>
<text x="288" y="474" text-anchor="middle" dominant-baseline="central" fill="#666" font-size="11">dns_int only</text>

<rect x="378" y="440" width="174" height="48" rx="8" fill="#222" stroke="#555" stroke-width="0.8"/>
<text x="465" y="457" text-anchor="middle" dominant-baseline="central" fill="#aaa" font-size="13" font-weight="500">backup-manager</text>
<text x="465" y="474" text-anchor="middle" dominant-baseline="central" fill="#666" font-size="11">dns_int only · behind Caddy</text>

<!-- Legend inside dns_int -->
<circle cx="34" cy="506" r="5" fill="#ba7517"/>
<text x="44" y="510" fill="#888" font-size="10">dual-attached: dns_int + mgmt_net (published ports)</text>
<circle cx="34" cy="522" r="5" fill="#444"/>
<text x="44" y="526" fill="#666" font-size="10">dns_int only — no direct LAN exposure</text>

<!-- Host systemd watchdog — OUTSIDE Docker -->
<rect x="18" y="548" width="300" height="40" rx="8" fill="none" stroke="#444" stroke-width="0.7" stroke-dasharray="3 3"/>
<text x="28" y="563" fill="#777" font-size="11" font-weight="500">Host — systemd watchdog timer (outside Docker)</text>
<text x="28" y="578" fill="#555" font-size="10">checks Prometheus container IP on dns_int · fires Telegram if down</text>

<!-- ===== RIGHT COLUMN ===== -->

<!-- mgmt_net Docker bridge -->
<rect x="590" y="180" width="290" height="200" rx="12" fill="none" stroke="#555" stroke-width="0.8" stroke-dasharray="5 3"/>
<text x="600" y="197" fill="#777" font-size="10">mgmt_net — Docker management bridge</text>
<text x="600" y="211" fill="#555" font-size="10">(not a device network — bridge for service publishing)</text>
<line x1="600" y1="218" x2="870" y2="218" stroke="#333" stroke-width="0.5"/>
<text x="600" y="232" fill="#999" font-size="11">Prometheus · Grafana · Alertmanager</text>
<text x="600" y="248" fill="#999" font-size="11">blackbox-exp · Dockhand · Caddy</text>
<line x1="600" y1="258" x2="870" y2="258" stroke="#333" stroke-width="0.5"/>
<text x="600" y="272" fill="#666" font-size="10">publishes th-*.home.arpa to trusted LAN</text>
<text x="600" y="286" fill="#666" font-size="10">all routes protected by Authelia session</text>
<text x="600" y="300" fill="#666" font-size="10">Caddy is the single LAN entry point</text>
<text x="600" y="314" fill="#666" font-size="10">Grafana + Dockhand use app-level auth</text>
<text x="600" y="328" fill="#666" font-size="10">backup-manager + Prometheus behind Authelia</text>
<text x="600" y="346" fill="#555" font-size="10">↓ publishes to Trusted LAN via host port</text>

<!-- Trusted LAN entry -->
<line x1="735" y1="380" x2="735" y2="396" stroke="#888" stroke-width="0.8" marker-end="url(#a)"/>
<rect x="590" y="396" width="290" height="34" rx="8" fill="#1e1e1e" stroke="#555" stroke-width="0.7"/>
<text x="735" y="413" text-anchor="middle" dominant-baseline="central" fill="#aaa" font-size="12">Trusted LAN — admin access via Caddy</text>

<!-- Physical VLAN segments -->
<text x="735" y="450" text-anchor="middle" fill="#555" font-size="10">physical VLAN segments — outside Docker</text>

<rect x="590" y="460" width="290" height="52" rx="8" fill="#0c3a6b" stroke="#378add" stroke-width="0.8"/>
<text x="735" y="478" text-anchor="middle" dominant-baseline="central" fill="#b5d4f4" font-size="13" font-weight="500">VLAN 1 — Trusted</text>
<text x="735" y="496" text-anchor="middle" dominant-baseline="central" fill="#85b7eb" font-size="11">192.168.1.0/24 · each device → Pi-hole trusted</text>

<rect x="590" y="520" width="290" height="52" rx="8" fill="#0c3a6b" stroke="#378add" stroke-width="0.8"/>
<text x="735" y="538" text-anchor="middle" dominant-baseline="central" fill="#b5d4f4" font-size="13" font-weight="500">VLAN 50 — IoT</text>
<text x="735" y="556" text-anchor="middle" dominant-baseline="central" fill="#85b7eb" font-size="11">192.168.50.0/24 · each device → Pi-hole IoT</text>

<rect x="590" y="580" width="290" height="52" rx="8" fill="#0c3a6b" stroke="#378add" stroke-width="0.8"/>
<text x="735" y="598" text-anchor="middle" dominant-baseline="central" fill="#b5d4f4" font-size="13" font-weight="500">VLAN 99 — Guest</text>
<text x="735" y="616" text-anchor="middle" dominant-baseline="central" fill="#85b7eb" font-size="11">10.10.99.0/28 · each device → Pi-hole guest</text>

<!-- macvlan connection paths: from Pi-hole right edges, route below dns_int, connect to VLAN boxes -->
<path d="M566 290 L578 290 L578 486 L590 486" fill="none" stroke="#378add" stroke-width="0.7" stroke-dasharray="4 2" marker-end="url(#ab)"/>
<path d="M566 290 L580 290 L580 546 L590 546" fill="none" stroke="#378add" stroke-width="0.7" stroke-dasharray="4 2" marker-end="url(#ab)"/>
<path d="M566 290 L582 290 L582 606 L590 606" fill="none" stroke="#378add" stroke-width="0.7" stroke-dasharray="4 2" marker-end="url(#ab)"/>
<text x="562" y="285" text-anchor="end" fill="#378add" font-size="9">macvlan</text>

<!-- Status bar -->
<rect x="18" y="606" width="548" height="28" rx="8" fill="#3d0a0a" stroke="#a32d2d" stroke-width="0.8"/>
<text x="292" y="620" text-anchor="middle" dominant-baseline="central" fill="#f09595" font-size="12" font-weight="500">Admin control plane — 9 API endpoints still needed</text>

<!-- Correction notes -->
<text x="590" y="648" fill="#555" font-size="10" font-weight="500">Corrections from previous diagram:</text>
<text x="590" y="663" fill="#444" font-size="10">· mgmt_net = Docker bridge, not device network</text>
<text x="590" y="677" fill="#444" font-size="10">· Each Pi-hole has dual attachment: dns_int + macvlan</text>
<text x="590" y="691" fill="#444" font-size="10">· Each VLAN serves its own Pi-hole only</text>
<text x="590" y="705" fill="#444" font-size="10">· Authelia + backup-manager = dns_int only</text>
<text x="590" y="719" fill="#444" font-size="10">· Watchdog = host systemd, not inside Docker</text>
<text x="590" y="733" fill="#444" font-size="10">· Full monitoring stack: +node-exp, cadvisor, pihole-exp</text>
<text x="590" y="747" fill="#444" font-size="10">· API count updated: 2 endpoints now implemented</text>

</svg>
